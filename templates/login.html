{% extends "base.html" %}
{% block title %}登录 | OrderFlow{% endblock %}
{% block content %}
<section class="login-wrap">
  <div class="login-card">
    <p class="eyebrow">内部订单台账系统</p>
    <h1>让订单链路一页看清</h1>
    <p class="lede">
      围绕订单维护产品、发货、付款和发票信息。第一版默认管理员账号为
      <code>admin</code>，密码为 <code>admin123</code>。
    </p>
    <form method="post" action="/login" class="stack">
      <label>
        <span>用户名</span>
        <input name="username" type="text" placeholder="请输入用户名" required />
      </label>
      <label>
        <span>密码</span>
        <input name="password" type="password" placeholder="请输入密码" required />
      </label>
      <button class="button primary" type="submit">登录系统</button>
    </form>
  </div>
</section>
{% endblock %}
